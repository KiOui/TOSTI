---

name: "CI"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  release:
    types: [published]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR runs; never cancel master or release runs (they publish images).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v4

      - name: "Install OS dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libxmlsec1-dev pkg-config

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: "Set up Python"
        run: uv python install

      - name: "Install the project"
        run: uv sync --locked --all-extras --dev

      - name: "Test migrations"
        run: uv run python website/manage.py makemigrations --no-input --check --dry-run

      - name: "Perform Django self-check"
        run: uv run python3 website/manage.py check

      - name: "Run Django tests using Coverage"
        run: uv run coverage run website/manage.py test website/

      - name: "Check Coverage report"
        run: uv run coverage report --omit "*/site-packages/*,*/migrations/*"

  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v4

      - name: "Install OS dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libxmlsec1-dev pkg-config

      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: "Set up Python"
        run: uv python install

      - name: "Install the project"
        run: uv sync --locked --all-extras --dev

      - name: "Run Black"
        run: uv run black --check website

      - name: "Run flake8"
        run: >-
          uv run
          flake8
          --exclude="migrations,website/tosti/settings/*.py"
          --max-line-length=119
          website

  build-image:
    name: "Build & push image"
    needs: [test, lint]
    # Build+push on master pushes and on published releases; skip on PRs.
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: "Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kioui/tosti
          # Tag strategy:
          #   master push   → sha-<sha>, latest
          #   release vX.Y.Z → sha-<sha>, X.Y.Z, X.Y, X (and "latest" only on non-prerelease)
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max