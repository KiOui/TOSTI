---

name: "Deploy"

on:
  workflow_run:
    # Trigger on the image build only — it's what we deploy. We verify
    # Testing and linting succeeded for the same SHA inside the job.
    workflows: ["Docker Image CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to production"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: tosti.science.ru.nl
    timeout-minutes: 15

    steps:
      - name: "Checkout the triggering commit"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: "Verify Testing and linting succeeded for this SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          for workflow in "Testing" "Linting"; do
            conclusion=$(gh run list \
              --workflow "$workflow" \
              --commit "$SHA" \
              --json conclusion \
              --jq '.[0].conclusion // "missing"')
            if [ "$conclusion" != "success" ]; then
              echo "::error::$workflow for $SHA concluded as '$conclusion' (expected 'success'); refusing to deploy."
              exit 1
            fi
            echo "$workflow: success"
          done

      - name: "Install SSH key and known_hosts"
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ vars.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: "Materialize SAML keys from secrets"
        env:
          SAML_PRIVATE_KEY: ${{ secrets.SAML_PRIVATE_KEY }}
          SAML_PUBLIC_CERT: ${{ secrets.SAML_PUBLIC_CERT }}
        run: |
          set -euo pipefail
          if [ -z "$SAML_PRIVATE_KEY" ] || [ -z "$SAML_PUBLIC_CERT" ]; then
            echo "::error::SAML_PRIVATE_KEY or SAML_PUBLIC_CERT is empty; refusing to deploy (would wipe the VM's SAML keys)."
            exit 1
          fi
          mkdir -p saml
          printf '%s' "$SAML_PRIVATE_KEY" > saml/private.key
          printf '%s' "$SAML_PUBLIC_CERT" > saml/public.crt
          chmod 600 saml/private.key
          chmod 644 saml/public.crt

      - name: "Rsync stack files to VM"
        run: |
          rsync -az --delete \
            deploy/docker-compose.yml deploy/Caddyfile \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_DIR }}/
          rsync -az --delete saml/ \
            ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}:${{ vars.DEPLOY_DIR }}/saml/

      - name: "Write .env on VM"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          YIVI_TOKEN: ${{ secrets.YIVI_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DJANGO_HOSTNAME: ${{ vars.DJANGO_HOSTNAME }}
          YIVI_HOSTNAME: ${{ vars.YIVI_HOSTNAME }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
          SAML_ENTITY_ID: ${{ vars.SAML_ENTITY_ID }}
          EMAIL_HOST: ${{ vars.EMAIL_HOST }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT }}
          EMAIL_ADDRESS: ${{ vars.EMAIL_ADDRESS }}
        run: |
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} \
            "umask 077 && cat > ${{ vars.DEPLOY_DIR }}/.env" <<EOF
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
          YIVI_TOKEN=${YIVI_TOKEN}
          SENTRY_DSN=${SENTRY_DSN}
          DJANGO_HOSTNAME=${DJANGO_HOSTNAME}
          YIVI_HOSTNAME=${YIVI_HOSTNAME}
          DEPLOY_HOST=${DEPLOY_HOST}
          DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
          SAML_ENTITY_ID=${SAML_ENTITY_ID}
          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=${EMAIL_PORT}
          EMAIL_ADDRESS=${EMAIL_ADDRESS}
          EOF

      - name: "Pull image and restart stack"
        run: |
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} \
            "cd ${{ vars.DEPLOY_DIR }} && docker compose pull && docker compose up -d --remove-orphans"

      - name: "Wait for web to be healthy"
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} \
            "DEPLOY_DIR=$DEPLOY_DIR bash -se" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_DIR"
          web_cid=$(docker compose ps -q web)
          if [ -z "$web_cid" ]; then
            echo "::error::web container not found under compose project; did 'compose up' succeed?"
            exit 1
          fi
          for i in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$web_cid" 2>/dev/null || echo missing)
            case "$status" in
              healthy) echo "web healthy after ${i}x5s"; exit 0 ;;
              unhealthy) echo "web unhealthy"; docker logs --tail 100 "$web_cid"; exit 1 ;;
            esac
            sleep 5
          done
          echo "timeout waiting for web to become healthy"
          docker logs --tail 100 "$web_cid"
          exit 1
          EOF
