---

name: "Deploy"

on:
  workflow_run:
    # CI runs test + lint + build-image as a linear pipeline. By the time CI
    # succeeds on master, we know a new image has been pushed to GHCR.
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy to production"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, production]
    environment: tosti.science.ru.nl
    timeout-minutes: 15

    steps:
      - name: "Checkout the triggering commit"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: "Materialize SAML keys from secrets"
        env:
          SAML_PRIVATE_KEY: ${{ secrets.SAML_PRIVATE_KEY }}
          SAML_PUBLIC_CERT: ${{ secrets.SAML_PUBLIC_CERT }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          if [ -z "$SAML_PRIVATE_KEY" ] || [ -z "$SAML_PUBLIC_CERT" ]; then
            echo "::error::SAML_PRIVATE_KEY or SAML_PUBLIC_CERT is empty; refusing to deploy."
            exit 1
          fi
          mkdir -p "$DEPLOY_DIR/saml"
          printf '%s' "$SAML_PRIVATE_KEY" > "$DEPLOY_DIR/saml/private.key"
          printf '%s' "$SAML_PUBLIC_CERT" > "$DEPLOY_DIR/saml/public.crt"
          chmod 755 "$DEPLOY_DIR/saml"
          chmod 644 "$DEPLOY_DIR/saml/private.key"
          chmod 644 "$DEPLOY_DIR/saml/public.crt"

      - name: "Copy compose + Caddyfile into deploy dir"
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          install -m 644 deploy/docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"
          install -m 644 deploy/Caddyfile "$DEPLOY_DIR/Caddyfile"

      - name: "Write .env in deploy dir"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          YIVI_TOKEN: ${{ secrets.YIVI_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DJANGO_HOSTNAME: ${{ vars.DJANGO_HOSTNAME }}
          YIVI_HOSTNAME: ${{ vars.YIVI_HOSTNAME }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DJANGO_ALLOWED_HOSTS: ${{ vars.DJANGO_ALLOWED_HOSTS }}
          SAML_ENTITY_ID: ${{ vars.SAML_ENTITY_ID }}
          EMAIL_HOST: ${{ vars.EMAIL_HOST }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT }}
          EMAIL_ADDRESS: ${{ vars.EMAIL_ADDRESS }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          umask 077
          cat > "$DEPLOY_DIR/.env" <<EOF
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
          YIVI_TOKEN=${YIVI_TOKEN}
          SENTRY_DSN=${SENTRY_DSN}
          DJANGO_HOSTNAME=${DJANGO_HOSTNAME}
          YIVI_HOSTNAME=${YIVI_HOSTNAME}
          DEPLOY_HOST=${DEPLOY_HOST}
          DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
          SAML_ENTITY_ID=${SAML_ENTITY_ID}
          EMAIL_HOST=${EMAIL_HOST}
          EMAIL_PORT=${EMAIL_PORT}
          EMAIL_ADDRESS=${EMAIL_ADDRESS}
          EOF

      - name: "Pull image and restart stack"
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          docker compose pull
          docker compose up -d --remove-orphans

      - name: "Wait for web to be healthy"
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          cd "$DEPLOY_DIR"
          web_cid=$(docker compose ps -q web)
          if [ -z "$web_cid" ]; then
            echo "::error::web container not found; did 'compose up' succeed?"
            exit 1
          fi
          for i in $(seq 1 60); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$web_cid" 2>/dev/null || echo missing)
            case "$status" in
              healthy) echo "web healthy after ${i}x5s"; exit 0 ;;
              unhealthy) echo "web unhealthy"; docker logs --tail 100 "$web_cid"; exit 1 ;;
            esac
            sleep 5
          done
          echo "timeout waiting for web to become healthy"
          docker logs --tail 100 "$web_cid"
          exit 1

      - name: "Create Sentry release"
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        with:
          version: ${{ github.event.workflow_run.head_sha }}
          environment: production
          finalize: true
