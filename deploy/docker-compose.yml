name: tosti

x-tosti-image: &tosti-image ghcr.io/kioui/tosti:latest

# Cap container log growth: 3 × 10 MB per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Postgres connection info — needed by anything that talks to the DB.
x-db-env: &db-env
  POSTGRES_USER: tosti
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: tosti
  POSTGRES_HOST: database
  POSTGRES_PORT: 5432

# Minimum env needed to boot Django + report errors. Used by every service
# that imports the Django settings (web, cron).
x-django-core-env: &django-core-env
  <<: *db-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  SENTRY_DSN: ${SENTRY_DSN}

# Web-only env: HTTP serving, SAML login, Yivi requests, outgoing mail.
# Cron doesn't do any of these.
x-django-web-env: &django-web-env
  <<: *django-core-env
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  YIVI_SERVER_URL: http://yivi:80
  YIVI_SERVER_TOKEN: ${YIVI_TOKEN}
  SAML_ENTITY_ID: ${SAML_ENTITY_ID}
  SAML_BASE_URL: https://${DJANGO_HOSTNAME}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_PORT: ${EMAIL_PORT}
  EMAIL_DEFAULT_SENDER: ${EMAIL_ADDRESS}
  EMAIL_HOST_USER: ${EMAIL_ADDRESS}
  DEFAULT_FROM_EMAIL: "TOSTI <${EMAIL_ADDRESS}>"
  SERVER_EMAIL: ${EMAIL_ADDRESS}

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DJANGO_HOSTNAME: ${DJANGO_HOSTNAME}
      YIVI_HOSTNAME: ${YIVI_HOSTNAME}
      DEPLOY_HOST: ${DEPLOY_HOST}
    depends_on:
      web:
        condition: service_healthy
      yivi:
        condition: service_started
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  yivi:
    image: ghcr.io/privacybydesign/irma:edge
    command: >
      server -v --requestors '{"tosti": {"auth_method": "token", "key": "${YIVI_TOKEN}"}}' --production --no-email --url https://${YIVI_HOSTNAME} --port 80
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    environment:
      YIVI_TOKEN: ${YIVI_TOKEN}

  database:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - db
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment: *db-env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "tosti", "-d", "tosti"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: *tosti-image
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - web
      - db
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - media:/media
      - cache:/app/cache
    secrets:
      - saml_private_key
      - saml_public_cert
    environment: *django-web-env
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  cron:
    image: *tosti-image
    entrypoint: ["/bin/sh", "/entrypoint_cron.sh"]
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    networks:
      - db
      - outbound
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - media:/media
      - cache:/app/cache
    environment: *django-core-env

networks:
  # Public-facing (caddy, yivi) + backend HTTP (web, yivi).
  web:
  # Database-only network; no internet access, no external services.
  db:
    internal: true
  # Outbound-only network for services that need to reach external APIs without being reachable from caddy.
  outbound:

volumes:
  pg-data:
  media:
  cache:
  caddy-data:
  caddy-config:

secrets:
  saml_private_key:
    file: ./saml/private.key
  saml_public_cert:
    file: ./saml/public.crt
